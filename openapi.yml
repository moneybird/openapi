                    workflow_id:
                      $ref: '#/components/schemas/identifier'
                      description: Should be a valid workflow id.
                    identifier:
                      type: string
                      description: Should be unique for the administration.
                    frequency_preset:
                      type: string
                      description: A predefined billing interval label for subscription products, e.g. `monthly`, `quarterly`, `yearly`.
