    patch:
      summary: Updates a ledger account
      description: |-
        Updates a ledger account.

        ### Required scope(s)
         `settings`
      tags:
        - Ledger accounts
      security:
        - bearerAuth:
            - settings
      parameters:
        - $ref: '#/components/parameters/administration_id'
        - name: id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/identifier'
        - $ref: '#/components/parameters/format'
      requestBody:
        required: true
        content:
          application/*:
            schema:
              unevaluatedProperties: false
              type: object
              properties:
                ledger_account:
                  type: object
                  unevaluatedProperties: false
                  properties:
                    name:
                      type: string
                      description: Should be unique for this combination of administration and account type.
                    account_id:
                      type: string
                      description: Optional field, also known as general ledger code. Should be unique.
                    account_type:
                      type: string
                      enum:
                        - non_current_assets
                        - current_assets
                        - equity
                        - provisions
                        - non_current_liabilities
                        - current_liabilities
                        - revenue
                        - direct_costs
                        - expenses
                        - other_income_expenses
                    parent_id:
                      $ref: '#/components/schemas/identifier'
                      description: Id of the parent ledger account. Should be a valid ledger account id.
                    allowed_document_types:
                      type: string
                      enum:
                        - sales_invoice
                        - purchase_invoice
                        - general_journal_document
                        - financial_mutation
                        - payment
                      description: Restricts the document types this ledger account can be used on. Defaults to a set derived from the `account_type`.
                    description:
                      type: string
                  required: []
                rgs_code:
                  type: string
                  description: Existing RGS version 3.5 code, e.g. 'WMfoBelMfo'
              required: []
            examples:
              UpdatesTheInformationInTheLedgerAccount:
                summary: Updates the information in the ledger account
                value:
                  ledger_account:
                    name: New name
              UpdatesALedgerAccountWithTaxonomyItemByProvidingAnExistingRgsCode:
                summary: Updates a ledger account with taxonomy item by providing an existing rgs code
                value:
                  rgs_code: WMfoBelMfo
                  ledger_account:
                    name: new name
