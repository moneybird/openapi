  /{administration_id}/time_entries{format}:
    get:
      summary: List all time entries
      description: |-
        Returns a paginated list of all time entries in the administration.

        The `filter` argument allows you to filter the list of time entries. Filters are a combination of keys and values,
        separated by a comma: `period:this_year,state:all`. The available options for filtering are:

        | **Filter** | **Type** | **Default** | **Description** |
        | --- | --- | --- | --- |
        | state | `String` | `all` | `all`, `open` or `non_billable` |
        | period | `String` | `this_year` | This can either be the description of a period (`this_month`, `prev_month`, `next_month`, `this_quarter`, `prev_quarter`, `next_quarter`, `this_year`,           `prev_year`, `next_year`) or a custom period (`201301..201302`, `20130101..20130131`) |
        | contact_id | `Integer` | | Select time entries belonging to a certain contact |
        | include_nil_contacts | `Boolean` | false | Whether to include time entries that have no assigned contact
        | include_active | `Boolean` | false | Whether to include active time entries i.e. time entries without ended_at
        | project_id | `Integer` | | Select time entries belonging to a certain project |
        | user_id | `Integer` | | Select time entries belonging to a certain user |
        | day | `Date` | | Select time entries on a specific date |

        You can filter by multiple states at the same time as well. To do this, separate the state values by a pipe: `state:open|non_billable`.
      tags:
        - Time entries
      parameters:
        - $ref: '#/components/parameters/administration_id'
        - $ref: '#/components/parameters/format'
        - name: filter
          in: query
          required: false
          schema:
            type: string
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/per_page'
        - name: query
          in: query
          required: false
          schema:
            type: string
            description: Allows filtering by time entry description.
      responses:
        '200':
          description: A list of time entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/time_entry_response'
        '400':
          $ref: '#/components/responses/400_bad_request'
        '404':
          $ref: '#/components/responses/404_not_found'
      operationId: get_administration_id_time_entries
    post:
      summary: Create a time entry
      description: |-
        API to post a time entry. Used to create time entries to record time spent by an employee.
        Api user needs access to both sales invoices and time entries for this action.
        `started_at` and `ended_at` are rounded down to full minutes when creating a time entry, with a minimum of 1 minute between them.
      tags:
        - Time entries
      parameters:
        - $ref: '#/components/parameters/administration_id'
        - $ref: '#/components/parameters/format'
      requestBody:
        required: true
        content:
          application/*:
            schema:
              unevaluatedProperties: false
              type: object
              properties:
                time_entry:
                  type: object
                  unevaluatedProperties: false
                  properties:
                    user_id:
                      $ref: '#/components/schemas/identifier'
                      description: The employee for which the time should be entered. Should be a valid user id.
                    started_at:
                      $ref: '#/components/schemas/timestamp'
                      description: The start time of the time entry. Rounded down to full minutes.
                    ended_at:
                      $ref: '#/components/schemas/timestamp'
                      description: The end time of the time entry. Rounded down to full minutes. Omit to create a running (active) time entry.
                    description:
                      type: string
                      description: A description on how the time was spent. May be shown on the invoice.
                    contact_id:
                      $ref: '#/components/schemas/identifier'
                      description: Should be a valid contact id.
                    project_id:
                      $ref: '#/components/schemas/identifier'
                      description: Should be a valid project id.
                    sales_invoice_id:
                      $ref: '#/components/schemas/identifier'
                      description: Should be a valid sales invoice id.
                    billable:
                      type:
                        - boolean
                        - string
                      default: true
                      description: Whether this time entry is billable to the client.
                    paused_duration:
                      type: integer
                      description: Total paused duration in seconds, is rounded down to full minutes.
                  required:
                    - user_id
                    - started_at
                    - description
              required: []
      responses:
        '201':
          description: Time entry created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/time_entry_response'
        '402':
          $ref: '#/components/responses/402_payment_required'
        '404':
          $ref: '#/components/responses/404_not_found'
        '422':
          $ref: '#/components/responses/422_unprocessable_entity'
      operationId: post_administration_id_time_entries
