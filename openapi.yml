  /{administration_id}/financial_statements{format}:
    post:
      summary: Create a new financial statement
      description: |-
        Creates a new financial statement. Provided financial mutations will be grouped in the statement.

        ### Required scope(s)
         `bank`
      tags:
        - Financial statements
      security:
        - bearerAuth:
            - bank
      parameters:
        - $ref: '#/components/parameters/administration_id'
        - $ref: '#/components/parameters/format'
      requestBody:
        required: true
        content:
          application/*:
            schema:
              unevaluatedProperties: false
              type: object
              properties:
                financial_statement:
                  type: object
                  unevaluatedProperties: false
                  properties:
                    financial_account_id:
                      $ref: '#/components/schemas/identifier'
                      description: Should be a valid financial account id.
                    reference:
                      type: string
                      description: A unique reference for this financial statement, e.g. the bank statement number.
                    official_date:
                      type: string
                      format: date
                      description: The date of the official bank balance.
                    official_balance:
                      $ref: '#/components/schemas/number'
                      description: Both a decimal and a string '10,95' are accepted. Should be a number -1,000,000,000 <= *n* <= 1,000,000,000.
                    importer_key:
                      type: string
                      description: An identifier for the import source or batch, e.g. a bank feed provider reference.
                    financial_mutations_attributes:
                      oneOf:
                        - type: array
                          items:
                            type: object
                            unevaluatedProperties: false
                            properties:
                              date:
                                type: string
                                format: date
                                description: The transaction date.
                              valutation_date:
                                type: string
                                format: date
                                description: The value date of the transaction, i.e. when the funds are actually credited or debited. May differ from the transaction date.
                              message:
                                type: string
                                description: The description or narrative of the bank transaction as provided by the bank.
                              amount:
                                $ref: '#/components/schemas/number'
                                description: Both a decimal and a string '10,95' are accepted.
                              code:
                                type: string
                                description: The bank transaction type code, e.g. a SWIFT transaction code. Primarily used internally for bank statement imports and automatic booking; most API users can omit this.
                              contra_account_name:
                                type: string
                                description: The name of the counterparty's account holder.
                              contra_account_number:
                                type: string
                                description: The account number (IBAN) of the counterparty.
                              batch_reference:
                                type: string
                                description: A reference identifying a batch of transactions, e.g. for grouped SEPA payments.
                              offset:
                                type: integer
                                description: The position offset of this mutation within the statement. Used for ordering.
                              account_servicer_transaction_id:
                                type: string
                                description: A unique transaction ID assigned by the bank. Used for deduplication.
                              account_servicer_metadata:
                                type: object
                                description: Additional metadata provided by the bank for this transaction.
                              adyen_payment_instrument_id:
                                $ref: '#/components/schemas/identifier'
                                description: Should be a valid adyen payment instrument id.
                              _destroy:
                                type:
                                  - boolean
                                  - string
                                description: Set to `true` to remove this financial mutation from the statement.
                              smart_transfer:
                                type:
                                  - boolean
                                  - string
                                description: Indicates that this financial mutation was created by a smart transfer rule.
                            required: []
                        - type: object
                          additionalProperties:
                            type: object
                            properties:
                              date:
                                type: string
                                format: date
                                description: The transaction date.
                              valutation_date:
                                type: string
                                format: date
                                description: The value date of the transaction, i.e. when the funds are actually credited or debited. May differ from the transaction date.
                              message:
                                type: string
                                description: The description or narrative of the bank transaction as provided by the bank.
                              amount:
                                $ref: '#/components/schemas/number'
                                description: Both a decimal and a string '10,95' are accepted.
                              code:
                                type: string
                                description: The bank transaction type code, e.g. a SWIFT transaction code. Primarily used internally for bank statement imports and automatic booking; most API users can omit this.
                              contra_account_name:
                                type: string
                                description: The name of the counterparty's account holder.
                              contra_account_number:
                                type: string
                                description: The account number (IBAN) of the counterparty.
                              batch_reference:
                                type: string
                                description: A reference identifying a batch of transactions, e.g. for grouped SEPA payments.
                              offset:
                                type: integer
                                description: The position offset of this mutation within the statement. Used for ordering.
                              account_servicer_transaction_id:
                                type: string
                                description: A unique transaction ID assigned by the bank. Used for deduplication.
                              account_servicer_metadata:
                                type: object
                                description: Additional metadata provided by the bank for this transaction.
                              adyen_payment_instrument_id:
                                $ref: '#/components/schemas/identifier'
                                description: Should be a valid adyen payment instrument id.
                              _destroy:
                                type:
                                  - boolean
                                  - string
                                description: Set to `true` to remove this financial mutation from the statement.
                              smart_transfer:
                                type:
                                  - boolean
                                  - string
                                description: Indicates that this financial mutation was created by a smart transfer rule.
                            required: []
                  required:
                    - reference
              required: []
            examples:
              CreatesAFinancialStatement:
                summary: Creates a financial statement
                value:
                  financial_statement:
                    reference: 31012014_ABNAMRO
                    financial_account_id: 492272882434442560
                    financial_mutations_attributes:
                      '1':
                        date: '2026-07-10'
                        message: Foobar 1
                        amount: 100
                      '2':
                        date: '2026-07-10'
                        message: Foobar 2
                        amount: 200
      responses:
        '201':
          description: Financial statement created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/financial_statement_response'
              examples:
                CreatesAFinancialStatement:
                  summary: Creates a financial statement
                  value:
                    id: '492272882459608360'
