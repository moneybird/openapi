  /{administration_id}/subscriptions/{id}/create_and_schedule_one_off_sales_invoice{format}:
    post:
      summary: Create and schedule an invoice to be sent together with the subscription
      description: |-
        Besides the recurring sales invoice for the subscription, you sometimes need to bill
        separate costs like usage based charges. Ideally you want these costs to be on the
        same invoice as the subscription invoice. This endpoint allows you to put extra invoice
        details on the subscription invoice.

        This endpoint creates a new sales invoice and schedules it for sending on the same date as
        the next subscription invoice. During sending, Moneybird will merge both the scheduled invoice
        and the subscription invoice. This means the contact will receive one sales invoice with
        multiple invoice details, both from the subscription and from the one off sales invoice.

        ### Required scope(s)
         `sales_invoices`
      tags:
        - Subscriptions
      security:
        - bearerAuth:
            - sales_invoices
      parameters:
        - $ref: '#/components/parameters/administration_id'
        - name: id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/identifier'
        - $ref: '#/components/parameters/format'
      requestBody:
        required: true
        content:
          application/*:
            schema:
              unevaluatedProperties: false
              type: object
              properties:
                sales_invoice:
                  type: object
                  unevaluatedProperties: false
                  properties:
                    details_attributes:
                      $ref: '#/components/schemas/details_attributes'
                    invoice_date:
                      type: string
                      format: date
                      description: Date to schedule the invoice for. Defaults to the date of the next subscription invoice.
                  required: []
              required: []
            examples:
              CreatesASalesInvoice:
                summary: Creates a sales invoice
                value:
                  sales_invoice:
                    details_attributes:
                      '0':
                        description: Extra costs subscription
                        price: '10.5'
      responses:
        '201':
          description: Sales invoice created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sales_invoice_response'
              examples:
                CreatesASalesInvoice:
