    patch:
      summary: Update a sales invoice
      description: |-
        When updating a sales invoice, provide only the attributes you want to update. The other attributes will not be changed.

        ### Required scope(s)
         `sales_invoices`
      tags:
        - Sales invoices
      security:
        - bearerAuth:
            - sales_invoices
      parameters:
        - $ref: '#/components/parameters/administration_id'
        - name: id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/identifier'
        - $ref: '#/components/parameters/format'
      requestBody:
        required: true
        content:
          application/*:
            schema:
              unevaluatedProperties: false
              type: object
              properties:
                sales_invoice:
                  type: object
                  unevaluatedProperties: false
                  properties:
                    contact_id:
                      $ref: '#/components/schemas/identifier'
                      description: The ID of the contact associated with the sales invoice. This is mandatory when setting the contact_person_id. Should be a valid contact id.
                    contact_person_id:
                      $ref: '#/components/schemas/identifier'
                      description: The ID of the contact person associated with the sales invoice. Should be a valid contact person id.
                    update_contact:
                      type:
                        - boolean
                        - string
                      description: When `true`, the contact's address and other details are updated on the invoice from the current contact record.
                    original_estimate_id:
                      $ref: '#/components/schemas/identifier'
                      description: The ID of the estimate this invoice was created from. Used to link an invoice to its originating estimate.
                    document_style_id:
                      $ref: '#/components/schemas/identifier'
                      description: Default document style is used if value is not provided. Should be a valid document style id.
                    workflow_id:
                      $ref: '#/components/schemas/identifier'
                      description: If value is not provided, the workflow saved in the contact is used. If the contact doesn't have a default workflow, the administration's default workflow is used. Should be a valid workflow id.
                    reference:
                      type: string
                      description: Your own reference for this invoice, e.g. a project code or PO number. Visible to the recipient.
                    invoice_sequence_id:
                      type: string
                      description: The ID of the numbering sequence to use for the invoice number.
                    remove_invoice_sequence_id:
                      type:
                        - boolean
                        - string
                      description: Set to `true` to remove the assigned numbering sequence, reverting to the administration default.
                    invoice_date:
                      type: string
                      description: The date of the invoice.
                      format: date
                    first_due_interval:
                      type: integer
                      description: The number of days after the invoice date before the invoice is due.
                    currency:
                      type: string
                      description: ISO three-character currency code, e.g. EUR or USD.
                    prices_are_incl_tax:
                      type:
                        - boolean
                        - string
                      description: Whether the prices on the invoice are inclusive of tax.
                    payment_conditions:
                      type: string
                      description: Free-text payment conditions printed on the invoice, e.g. "Payment within 30 days".
                    discount:
                      $ref: '#/components/schemas/number'
                      description: Discount percentage applied to the entire invoice, e.g. `10.0` for 10%.
                    time_entry_ids:
                      type: array
                      description: An array of time entry IDs to associate with this invoice. Linked time entries will be marked as invoiced.
                      items:
                        $ref: '#/components/schemas/identifier'
                    details_attributes:
                      $ref: '#/components/schemas/details_attributes'
                    custom_fields_attributes:
                      $ref: '#/components/schemas/custom_fields_attributes'
                  required: []
              required: []
            examples:
              AddingAndRemovingASalesInvoiceDetail:
                summary: Adding and removing a sales invoice detail
                value:
                  sales_invoice:
                    details_attributes:
                      - description: Sofa
                        price: 199.99
                      - id: 492272915529598850
                        _destroy: true
              UpdatingTheSalesInvoiceReference:
                summary: Updating the sales invoice reference
                value:
