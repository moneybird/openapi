    post:
      summary: Create a new receipt
      description: |-
        Creates a new receipt.

        ### Required scope(s)
         `documents`
      tags:
        - 'Documents: Receipts'
      security:
        - bearerAuth:
            - documents
      parameters:
        - $ref: '#/components/parameters/administration_id'
