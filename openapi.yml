  /{administration_id}/sales_invoices{format}:
    get:
      summary: List all invoices
      description: |-
        Returns a paginated list of all sales invoices in the administration.

        The `filter` argument allows you to filter the list of invoices. Filters are a combination of keys and values,
        separated by a comma: `period:this_year,state:all`. The available options for filtering are:

        | **Filter** | **Type** | **Default** | **Description** |
        | - | - | - | - |
        | state | `String` | `all` | `all`, `draft`, `open`, `scheduled`, `pending_payment`, `late`, `reminded`, `paid` or `uncollectible` |
        | period | `String` | `this_year` | This can either be the description of a period (`this_month`, `prev_month`, `next_month`, `this_quarter`, `prev_quarter`, `next_quarter`, `this_year`,           `prev_year`, `next_year`) or a custom period (`201301..201302`, `20130101..20130131`) |
        | reference | `String` | | Select invoices with a certain reference |
        | contact_id | `Integer` | | Select invoices belonging to a certain contact |
        | recurring_sales_invoice_id | `Integer` | | Select invoices created by a certain recurring invoice |
        | workflow_id | `Integer` | | Select invoices that use a certain workflow |
        | created_after | `String` | | Select invoices created after the given time (exclusive). ISO 8601 formatted string. The time to compare with is in UTC timezone |
        | updated_after | `String` | | Select invoices updated after the given time (exclusive). ISO 8601 formatted string. The time to compare with is in UTC timezone |

        You can filter by multiple states at the same time as well. To do this, separate the state values by a pipe: `state:draft|scheduled`. This also holds for the reference.
      tags:
        - Sales invoices
      parameters:
        - $ref: '#/components/parameters/administration_id'
        - $ref: '#/components/parameters/format'
        - name: filter
          in: query
          required: false
          schema:
            type: string
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/per_page'
      responses:
        '200':
          description: A list of sales invoices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/sales_invoice_response'
        '400':
          $ref: '#/components/responses/400_bad_request'
      operationId: get_administration_id_sales_invoices
    post:
      summary: Create a sales invoice
      description: Create a sales invoice with the parameters defined in the request body.
      tags:
        - Sales invoices
      parameters:
        - $ref: '#/components/parameters/administration_id'
        - $ref: '#/components/parameters/format'
      requestBody:
        required: true
        content:
          application/*:
            schema:
              unevaluatedProperties: false
              type: object
              properties:
                sales_invoice:
                  type: object
                  unevaluatedProperties: false
                  properties:
                    contact_id:
                      $ref: '#/components/schemas/identifier'
                      description: The ID of the contact associated with the sales invoice. This is mandatory when setting the contact_person_id. Should be a valid contact id.
                    contact_person_id:
                      $ref: '#/components/schemas/identifier'
                      description: The ID of the contact person associated with the sales invoice. Should be a valid contact person id.
                    original_estimate_id:
                      $ref: '#/components/schemas/identifier'
                      description: The ID of the estimate this invoice was created from. Used to link an invoice to its originating estimate.
                    document_style_id:
                      $ref: '#/components/schemas/identifier'
                      description: Default document style is used if value is not provided. Should be a valid document style id.
                    workflow_id:
                      $ref: '#/components/schemas/identifier'
                      description: If value is not provided, the workflow saved in the contact is used. If the contact doesn't have a default workflow, the administration's default workflow is used. Should be a valid workflow id.
                    reference:
                      type: string
                      description: Your own reference for this invoice, e.g. a project code or PO number. Visible to the recipient.
                    invoice_sequence_id:
                      type: string
                      description: The ID of the numbering sequence to use for the invoice number. If not provided, the administration default is used.
                    invoice_date:
                      type: string
                      description: The date of the invoice. Defaults to the current date.
                      format: date
                    first_due_interval:
                      type: integer
                      description: The number of days after the invoice date before the invoice is due. Overrides the administration default.
                    currency:
                      type: string
                      description: ISO three-character currency code, e.g. EUR or USD.
                    prices_are_incl_tax:
                      type:
                        - boolean
                        - string
                      description: Whether the prices on the invoice are inclusive of tax. Defaults to the administration setting.
                    payment_conditions:
                      type: string
                      description: Free-text payment conditions printed on the invoice, e.g. "Payment within 30 days".
                    discount:
                      $ref: '#/components/schemas/number'
                      description: Discount percentage applied to the entire invoice, e.g. `10.0` for 10%.
                    time_entry_ids:
                      type: array
                      description: An array of time entry IDs to associate with this invoice. Linked time entries will be marked as invoiced.
                      items:
                        type:
                          - integer
                    details_attributes:
                      $ref: '#/components/schemas/details_attributes'
                    custom_fields_attributes:
                      $ref: '#/components/schemas/custom_fields_attributes'
                  required: []
                from_payment_request:
                  type:
                    - boolean
                    - string
                  description: Set to `true` when the invoice was created from a Moneybird payment request.
              required: []
      responses:
        '201':
          description: Sales invoice created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sales_invoice_response'
        '402':
          $ref: '#/components/responses/402_payment_required'
        '404':
          $ref: '#/components/responses/404_not_found'
        '422':
          $ref: '#/components/responses/422_unprocessable_entity'
      operationId: post_administration_id_sales_invoices
