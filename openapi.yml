    post:
      summary: Create a webhook
      description: |-
        Creates a new webhook. The provided URL should respond with a 200 HTTP status. After
        creation, the URL will receive notifications when events on documents in the
        administration occur. It is also possible to subscribe to certain events by adding an array
        with events you would like to receive notifications from. For a full list of available events
        and event groups, see the [webhook events documentation](https://developer.moneybird.com/webhooks/events).

        <p class="notice">
          <i class="fa fa-exclamation-triangle"></i>
          We strongly recommend that you use a secure HTTPS endpoint for receiving payload from Moneybird.<br/>
          If you use unencrypted HTTP, anyone on the network may be able to listen in on sensitive information like contacts and invoices.
        </p>
      tags:
        - Webhooks
      parameters:
        - $ref: '#/components/parameters/administration_id'
        - $ref: '#/components/parameters/format'
      requestBody:
        required: true
        content:
          application/*:
            schema:
              unevaluatedProperties: false
              type: object
              properties:
                url:
                  type: string
                  description: The HTTPS endpoint URL that will receive webhook notifications. Must respond with HTTP 200 on creation.
                enabled_events:
                  type: array
                  description: List of events to subscribe to. See [webhook events](https://developer.moneybird.com/webhooks/events) for all available events and event groups.
                  items:
                    type:
                      - string
              required:
                - url
      responses:
        '201':
          description: Webhook created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/webhook_response'
        '400':
          $ref: '#/components/responses/400_bad_request'
      operationId: post_administration_id_webhooks
