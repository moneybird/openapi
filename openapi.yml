  /{administration_id}/reports/export/auditfile{format}:
    post:
      summary: Export auditfile
      description: |-
        Queue the export of an auditfile (XAF XML format) for the specified year.
        The auditfile will be added to your [downloads](../downloads) when ready.

        The administration must not have any ledger accounts with missing or duplicate account IDs,
        and the specified year must contain journal entries.


        ### Required scope(s)
         All of: `bank`, `documents`, `estimates`, `sales_invoices` and `settings`
      tags:
        - Reports
      security:
        - bearerAuth:
            - bank
            - documents
            - estimates
            - sales_invoices
            - settings
      parameters:
        - $ref: '#/components/parameters/administration_id'
        - $ref: '#/components/parameters/format'
      requestBody:
        required: true
        content:
          application/*:
            schema:
              type: object
              required:
                - year
              properties:
                year:
                  type: string
                  description: The year for which to generate the auditfile
                  example: '2024'
            examples:
              AcceptsVersion40Parameter:
                summary: Accepts version 4.0 parameter
                value:
                  year: '2024'
                  version: '4.0'
              AcceptsVersion32Parameter:
                summary: Accepts version 3.2 parameter
                value:
                  year: '2024'
                  version: '3.2'
              UsesDefaultVersion32WhenVersionIsNotSpecified:
                summary: Uses default version 3.2 when version is not specified
                value:
                  year: '2024'
              QueuesAnAuditfileExportJobAndReturns204:
                summary: Queues an auditfile export job and returns 204
                value:
                  year: '2024'
