    post:
      summary: Create a sales invoice
      description: |-
        Create a sales invoice with the parameters defined in the request body.

        ### Required scope(s)
         `sales_invoices`
      tags:
        - Sales invoices
      security:
        - bearerAuth:
            - sales_invoices
      parameters:
        - $ref: '#/components/parameters/administration_id'
        - $ref: '#/components/parameters/format'
      requestBody:
        required: true
        content:
          application/*:
            schema:
              unevaluatedProperties: false
              type: object
              properties:
                sales_invoice:
                  type: object
                  unevaluatedProperties: false
                  properties:
                    contact_id:
                      $ref: '#/components/schemas/identifier'
                      description: The ID of the contact associated with the sales invoice. This is mandatory when setting the contact_person_id. Should be a valid contact id.
                    contact_person_id:
                      $ref: '#/components/schemas/identifier'
                      description: The ID of the contact person associated with the sales invoice. Should be a valid contact person id.
                    original_estimate_id:
                      $ref: '#/components/schemas/identifier'
                      description: The ID of the estimate this invoice was created from. Used to link an invoice to its originating estimate.
                    document_style_id:
                      $ref: '#/components/schemas/identifier'
                      description: Default document style is used if value is not provided. Should be a valid document style id.
                    workflow_id:
                      $ref: '#/components/schemas/identifier'
                      description: If value is not provided, the workflow saved in the contact is used. If the contact doesn't have a default workflow, the administration's default workflow is used. Should be a valid workflow id.
                    reference:
                      type: string
                      description: Your own reference for this invoice, e.g. a project code or PO number. Visible to the recipient.
                    invoice_sequence_id:
                      type: string
                      description: The ID of the numbering sequence to use for the invoice number. If not provided, the administration default is used.
                    invoice_date:
                      type: string
                      description: The date of the invoice. Defaults to the current date.
                      format: date
                    first_due_interval:
                      type: integer
                      description: The number of days after the invoice date before the invoice is due. Defaults to the first workflow step's due interval.
                    currency:
                      type: string
                      description: ISO three-character currency code, e.g. EUR or USD. Defaults to the workflow's currency.
                    prices_are_incl_tax:
                      type:
                        - boolean
                        - string
                      description: Whether the prices on the invoice are inclusive of tax. Defaults to the workflow's setting.
                    payment_conditions:
                      type: string
                      description: Free-text payment conditions printed on the invoice, e.g. "Payment within 30 days". Defaults to the workflow's payment conditions.
                    discount:
                      $ref: '#/components/schemas/number'
                      description: Discount percentage applied to the entire invoice, e.g. `10.0` for 10%.
                    time_entry_ids:
                      type: array
                      description: An array of time entry IDs to associate with this invoice. Linked time entries will be marked as invoiced.
                      items:
                        type:
                          - integer
                    details_attributes:
                      $ref: '#/components/schemas/details_attributes'
                    custom_fields_attributes:
                      $ref: '#/components/schemas/custom_fields_attributes'
                  required: []
                from_payment_request:
                  type:
                    - boolean
                    - string
                  description: Set to `true` when the invoice was created from a Moneybird payment request.
              required: []
            examples:
              CreateASalesInvoiceInAForeignCurrency:
                summary: Create a sales invoice in a foreign currency
                value:
                  sales_invoice:
                    reference: '30052'
                    contact_id: 492272914311153500
                    currency: USD
                    details_attributes:
                      - description: Rocking Chair
                        price: 159.99
                        tax_rate_id: 492272914531354430
              CreateABasicSalesInvoice:
                summary: Create a basic sales invoice
                value:
                  sales_invoice:
                    reference: '30052'
                    contact_id: 492272914960222100
                    details_attributes:
                      - description: Rocking Chair
                        price: 129.95
