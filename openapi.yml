  /{administration_id}/financial_mutations{format}:
    get:
      summary: List all financial mutations
      description: |-
        Returns a list of financial mutations in the administration. Limited to 100 financial mutations. If you
        need more financial mutations, use the [synchronize](#get_financial_mutations_synchronization) API.

        ### Required scope(s)
         `bank`
      tags:
        - Financial mutations
      security:
        - bearerAuth:
            - bank
      parameters:
        - $ref: '#/components/parameters/administration_id'
        - $ref: '#/components/parameters/format'
        - name: filter
          in: query
          required: false
          description: |-
            Filters are `key:value` terms separated by commas (e.g. `period:this_year,state:unprocessed`). Any filter you pass replaces the defaults below entirely, so include every key you need — in particular pass an explicit `period` (a named period or a `YYYYMMDD..YYYYMMDD` range) to look beyond the default financial year. Available filters:

            | **Filter** | **Type** | **Default** | **Description** |
            | - | - | - | - |
            | period | `String` | `this_year` | A named period (`this_week`, `prev_week`, `next_week`, `this_month`, `prev_month`, `next_month`, `this_quarter`, `prev_quarter`, `next_quarter`, `this_year`, `prev_year`, `next_year`) or a custom range (`201301..201302`, `20130101..20130131`) |
            | state | `String` | `all` | `all`, `unprocessed`, `processed` or `auto_booked` |
            | mutation_type | `String` | `all` | `all`, `debit` or `credit` |
            | financial_account_id | `Integer` | | Restrict to a single financial account |
            | amount_from | `String` | | Lower bound on the absolute mutation amount (negative input is treated as positive) |
            | amount_to | `String` | | Upper bound on the absolute mutation amount |

            Multiple values for `state` and `mutation_type` can be combined with a pipe, e.g. `state:unprocessed|processed`.
          schema:
            type: string
            default: period:this_year
          examples:
            ReturnsAllMutationsFilteredOnPeriod:
              summary: Returns all mutations filtered on period
              value: period:this_month
