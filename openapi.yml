      operationId: get_administration_id_time_entries
    post:
      summary: Create a time entry
      description: |-
        API to post a time entry. Used to create time entries to record time spent by an employee.
        Api user needs access to both sales invoices and time entries for this action.
        `started_at` and `ended_at` are rounded down to full minutes when creating a time entry, with a minimum of 1 minute between them.

        ### Required scope(s)
         `time_entries`
      tags:
        - Time entries
      security:
        - bearerAuth:
            - time_entries
      parameters:
        - $ref: '#/components/parameters/administration_id'
        - $ref: '#/components/parameters/format'
      requestBody:
