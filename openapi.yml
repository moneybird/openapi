  /{administration_id}/sales_invoices{format}:
    get:
      summary: List all invoices
      description: |-
        Returns a paginated list of sales invoices in the administration.

        ### Required scope(s)
         `sales_invoices`
      tags:
        - Sales invoices
      security:
        - bearerAuth:
            - sales_invoices
      parameters:
        - $ref: '#/components/parameters/administration_id'
        - $ref: '#/components/parameters/format'
        - name: filter
          in: query
          required: false
          description: |-
            Filters are `key:value` terms separated by commas (e.g. `period:this_year,state:all`). Any filter you pass replaces the defaults below entirely, so include every key you need — in particular pass an explicit `period` (a named period or a `YYYYMMDD..YYYYMMDD` range) to look beyond the default financial year. Available filters:

            | **Filter** | **Type** | **Default** | **Description** |
            | - | - | - | - |
            | state | `String` | `all` | `all`, `draft`, `open`, `scheduled`, `pending_payment`, `late`, `reminded`, `paid` or `uncollectible` |
            | period | `String` | `this_year` | A period description (`this_week`, `prev_week`, `next_week`, `this_month`, `prev_month`, `next_month`, `this_quarter`, `prev_quarter`, `next_quarter`, `this_year`, `prev_year`, `next_year`) or a custom period (`201301..201302`, `20130101..20130131`) |
            | reference | `String` | | Select invoices with a certain reference |
            | contact_id | `Integer` | | Select invoices belonging to a certain contact |
            | recurring_sales_invoice_id | `Integer` | | Select invoices created by a certain recurring invoice |
            | workflow_id | `Integer` | | Select invoices that use a certain workflow |
            | created_after | `String` | | Select invoices created after the given time (exclusive). ISO 8601 formatted string. The time to compare with is in UTC timezone |
            | updated_after | `String` | | Select invoices updated after the given time (exclusive). ISO 8601 formatted string. The time to compare with is in UTC timezone |

            You can filter by multiple states at the same time by separating the values with a pipe (`state:draft|scheduled`). This also holds for the reference.
          schema:
            type: string
            default: period:this_year
          examples:
            ReturnsAnEmptyListWhenFilterContactIdDoesNotMatchAnyContact:
              summary: Returns an empty list when filter contact id does not match any contact
              value: contact_id:123
            ReturnsAllInvoicesFilteredOnState:
              summary: Returns all invoices filtered on state
              value: state:late
            ReturnsAllInvoicesFilteredOnPeriod:
              summary: Returns all invoices filtered on period
              value: period:this_month
            ReturnsOnlySalesInvoicesUpdatedAfterGivenDatetime:
              summary: Returns only sales invoices updated after given datetime
              value: updated_after:2026-07-10 12:54:18 UTC
            ReturnsAllSalesInvoicesCreatedAfterGivenDatetime:
              summary: Returns all sales invoices created after given datetime
              value: created_after:2026-07-09 12:54:13 UTC
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/per_page'
      responses:
        '200':
          description: A list of sales invoices
          content:
            application/json:
