    get:
      summary: List all ids and versions
      description: |+
        Returns all financial mutations in the administration. The list contains the id and the version of the financial mutation.
        Check if the version of the financial mutation is newer than the version you have stored locally, use the `POST`
        variant for fetching financial mutations with the given ids. The `filter` argument allows you to filter the list of financial mutations. Filters are a combination of keys and values,
          separated by a comma: `period:this_year,state:all`. The available options for filtering are:

          | **Filter** | **Type** | **Default** | **Description** |
          | - | - | - | - |
          | period | `String` | `this_year` | This can either be the description of a period (`this_month`, `prev_month`, `next_month`, `this_quarter`, `prev_quarter`, `next_quarter`, `this_year`,             `prev_year`, `next_year`) or a custom period (`201301..201302`, `20130101..20130131`) |
          | state | `String` | | Can be `all`, `unprocessed` or `processed`|
          | mutation_type | `String` | | Can be `all`, `debit` or `credit` |
          | financial_account_id | `String` | |

      tags:
        - Financial mutations
      parameters:
        - $ref: '#/components/parameters/administration_id'
        - $ref: '#/components/parameters/format'
        - name: filter
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          $ref: '#/components/responses/200_synchronization_response'
      operationId: get_administration_id_financial_mutations_synchronization
