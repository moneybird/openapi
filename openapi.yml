    patch:
      summary: Update a financial statement
      description: |-
        When updating a financial statement, you only need to provide the information you want to change. Attributes you don't
        provide in the request will not be updated.

        ### Required scope(s)
         `bank`
      tags:
        - Financial statements
      security:
        - bearerAuth:
            - bank
      parameters:
        - $ref: '#/components/parameters/administration_id'
        - name: id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/identifier'
        - $ref: '#/components/parameters/format'
      requestBody:
        required: true
        content:
          application/*:
            schema:
              unevaluatedProperties: false
              type: object
              properties:
                financial_statement:
                  type: object
                  unevaluatedProperties: false
                  properties:
                    reference:
                      type: string
                      description: A unique reference for this financial statement, e.g. the bank statement number.
                    official_date:
                      type: string
                      description: The date of the official bank balance.
                      format: date
                    official_balance:
                      $ref: '#/components/schemas/number'
                      description: Both a decimal and a string '10,95' are accepted. Should be a number -1,000,000,000 <= *n* <= 1,000,000,000.
                    financial_mutations_attributes:
                      oneOf:
                        - type: array
                          items:
                            type: object
                            unevaluatedProperties: false
                            properties:
                              id:
                                type: integer
                                description: The ID of an existing financial mutation to update. Omit when adding a new mutation.
                              date:
                                type: string
                                format: date
                                description: The transaction date.
                              message:
                                type: string
                                description: The description or narrative of the bank transaction.
                              amount:
                                $ref: '#/components/schemas/number'
                                description: Both a decimal and a string '10,95' are accepted.
                              code:
                                type: string
                                description: The bank transaction type code. Primarily used internally for bank statement imports and automatic booking; most API users can omit this.
                              contra_account_name:
                                type: string
                                description: The name of the counterparty's account holder.
                              contra_account_number:
                                type: string
                                description: The account number (IBAN) of the counterparty.
                              batch_reference:
                                type: string
                                description: A reference identifying a batch of transactions.
                              offset:
                                type: integer
                                description: The position offset of this mutation within the statement.
                              account_servicer_transaction_id:
                                type: string
                                description: A unique transaction ID assigned by the bank. Used internally for deduplication when importing bank statements.
                              adyen_payment_instrument_id:
                                $ref: '#/components/schemas/identifier'
                                description: Should be a valid adyen payment instrument id.
                              _destroy:
                                type:
                                  - boolean
                                  - string
                                description: Set to `true` to remove this financial mutation from the statement.
                            required: []
                        - type: object
                          additionalProperties:
                            type: object
                            properties:
                              id:
                                type: integer
                                description: The ID of an existing financial mutation to update. Omit when adding a new mutation.
                              date:
                                type: string
                                format: date
                                description: The transaction date.
                              message:
                                type: string
                                description: The description or narrative of the bank transaction.
                              amount:
                                $ref: '#/components/schemas/number'
                                description: Both a decimal and a string '10,95' are accepted.
                              code:
                                type: string
                                description: The bank transaction type code. Primarily used internally for bank statement imports and automatic booking; most API users can omit this.
                              contra_account_name:
                                type: string
                                description: The name of the counterparty's account holder.
                              contra_account_number:
                                type: string
                                description: The account number (IBAN) of the counterparty.
                              batch_reference:
                                type: string
                                description: A reference identifying a batch of transactions.
                              offset:
                                type: integer
                                description: The position offset of this mutation within the statement.
