components:
  headers:
    link:
      description: Pagination links (next, prev)
      schema:
        type: string
    x-total-count:
      description: Total number of entries in the collection
      schema:
        type: integer
  parameters:
    administration_id:
      in: path
      name: administration_id
      required: true
      schema:
        $ref: '#/components/schemas/administration_id'
      description: The unique identifier of the administration
    format:
      in: path
      name: format
      required: true
      schema:
        type: string
        pattern: ^(.(json|xml))?$
        default: .json
      description: The format in which the response is given, can be empty to use the default format
    page:
      name: page
      in: query
      required: false
      schema:
        type:
          - integer
          - string
    per_page:
      name: per_page
      in: query
      required: false
      schema:
        type:
          - integer
          - string
        pattern: ^\d+$
        minimum: 1
        maximum: 100
    period:
      name: period
      in: query
      required: false
      description: |
        The period can be a date range or one of the presets. Date ranges must consist of whole months (start on 1st, end on last day of month).

        **Date range formats:**
          - `YYYYMMDD..YYYYMMDD` (e.g., `20250101..20250131`)
          - `YYYYMM..YYYYMM` (e.g., `202501..202501`)
          - `YYYYMM` (e.g., `202501`)

        **Preset options:**
          - `this_month` - Current month (default if not specified)
          - `prev_month` - Previous month
          - `next_month` - Next month
          - `this_quarter` - Current quarter
          - `prev_quarter` - Previous quarter
          - `next_quarter` - Next quarter
          - `this_year` - Current year
          - `prev_year` - Previous year
          - `next_year` - Next year

        **Period limits:**
          - Most endpoints: Maximum 1 month
          - Profit loss & balance sheet: Maximum 12 months
      schema:
        type: string
        pattern: ^\d{6,8}(..\d{6,8})?|this_month|prev_month|next_month|this_quarter|prev_quarter|next_quarter|this_year|prev_year|next_year$
        example: 20250101..20250131
        default: this_month
    period_until:
      name: period_until
      in: query
      required: false
      description: |
        A period until which a report should be generated.

        **Date range formats:**
          - `YYYYMM` (e.g., `202501`)

        **Preset options:**
          - `this_month` - Current month (default if not specified)
          - `prev_month` - Previous month
          - `this_quarter` - Current quarter
          - `prev_quarter` - Previous quarter
          - `this_year` - Current year
          - `prev_year` - Previous year
      schema:
        type: string
        pattern: ^\d{6,8}|this_month|prev_month|this_quarter|prev_quarter|this_year|prev_year$
        example: '202501'
        default: this_month
  requestBodies:
    payment_request:
      required: true
      content:
        application/*:
          schema:
            unevaluatedProperties: false
            type: object
            properties:
              payment:
                type: object
                unevaluatedProperties: false
                properties:
                  payment_date:
                    type: string
                    description: The date on which the payment was made.
                  price:
                    $ref: '#/components/schemas/number'
                    description: The amount paid in the document's currency. Both a decimal and a string '10,95' are accepted. Should be a number -1,000,000,000 <= *n* <= 1,000,000,000.
                  price_base:
                    $ref: '#/components/schemas/number'
                    description: Amount paid expressed in the base currency of the administration. Required when the document uses a different currency than the administration's base currency. Should be a number -1,000,000,000 <= *n* <= 1,000,000,000.
                  financial_account_id:
                    $ref: '#/components/schemas/identifier'
                    description: The ID of the financial account (bank account or cash register) associated with this payment. Required for `private_payment` and `cash_payment` actions. Should be a valid financial account id.
                  financial_mutation_id:
                    $ref: '#/components/schemas/identifier'
                    description: The ID of the bank transaction to link this payment to. Required for `bank_transfer` actions. Should be a valid financial mutation id.
                  transaction_identifier:
                    type: string
                    description: An external transaction reference, e.g. a bank transaction ID or PSP reference. Used to match the payment with financial mutations.
                  manual_payment_action:
                    type: string
                    description: Can be `private_payment` (needs financial_account_id), `payment_without_proof`, `cash_payment` (needs financial_account_id), `rounding_error`, `bank_transfer` (needs financial_mutation_id), `balance_settlement` (needs ledger_account_id) or `invoices_settlement` (needs invoice_id).
                  ledger_account_id:
                    $ref: '#/components/schemas/identifier'
                    description: The ID of the ledger account to book this payment to. Required for `balance_settlement` actions. Should be a valid ledger account id.
                  invoice_id:
                    $ref: '#/components/schemas/identifier'
                    description: The ID of the document to settle this payment against. Required for `invoices_settlement` actions. Should be a valid document id (sales invoice, purchase invoice, receipt, etc.).
                required:
                  - payment_date
                  - price
            required: []
  responses:
    200_synchronization_response:
      description: IDs and versions of records
      content:
        application/json:
          schema:
            type: array
            items:
              type: object
              unevaluatedProperties: false
              properties:
                id:
                  type:
                    - integer
                    - string
                version:
                  type:
                    - integer
                    - string
    204_no_content:
      description: No content
    302_found:
      description: Found
      content:
        text/plain:
          schema:
            type: string
    400_bad_request:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/symbolic_error'
    401_unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/symbolic_error'
    402_payment_required:
      description: Payment required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/symbolic_error'
    403_forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/symbolic_error'
    404_not_found:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/symbolic_error'
    422_unprocessable_entity:
      description: Unprocessable entity
      content:
        application/json:
          schema:
            anyOf:
              - $ref: '#/components/schemas/symbolic_error'
              - $ref: '#/components/schemas/non_symbolic_error'
    429_too_many_requests:
      description: Too many requests - rate limit exceeded
      content:
        application/json:
          schema:
            type: string
            example: Retry later
      headers:
        RateLimit-Limit:
          description: The rate limit ceiling for that given request
          schema:
            type: integer
            example: 150
        RateLimit-Remaining:
          description: The number of requests left for the time window
          schema:
            type: integer
            example: 149
        RateLimit-Reset:
          description: The time at which the current rate limit window resets in UTC epoch seconds
          schema:
            type: integer
            example: 1609459200
        Retry-After:
          description: The time at which the current rate limit window resets in UTC epoch seconds
          schema:
            type: integer
            example: 1609459200
    4XX_open_error:
      description: Error code
      content:
        application/json:
          schema:
            type: integer
    status_code:
      description: Status code
      content:
        application/json:
          schema:
            type: integer
  schemas:
    administration_id:
      allOf:
        - $ref: '#/components/schemas/identifier'
          description: A unique record identifier of an administration
          example: '123'
    administration_response:
      type: object
      unevaluatedProperties: false
      properties:
        id:
          $ref: '#/components/schemas/administration_id'
        name:
          type: string
          example: Moneybird
        language:
          type: string
          enum:
            - nl
            - nl-be
            - en
          example: nl
          description: The ISO 639-1 language code used in the administration
        currency:
          type: string
          description: The ISO 4217 currency code
          example: EUR
        country:
          type: string
          description: The ISO 3166-1 alpha-2 code the administration country
          example: NL
        time_zone:
          type: string
          description: The time zone of the administration
          example: Europe/Amsterdam
        access:
          type: string
          enum:
            - accountant_company
            - user
          description: The type of acess the user has to this administration
          example: user
        suspended:
          type: boolean
        period_locked_until:
          type:
            - string
            - 'null'
          format: date
        period_start_date:
          type: string
          format: date
          description: Start of the year in which the administration recorded its first bookkeeping data, based on journal entries.
          example: '2024-01-01'
    aging_report_item:
      type: object
      description: Aging report data item
      properties:
        contact_id:
          $ref: '#/components/schemas/identifier_nullable'
