            type: string
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/per_page'
      responses:
        '200':
          description: A list of recurring sales invoices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/recurring_sales_invoice_response'
        '400':
          $ref: '#/components/responses/400_bad_request'
      operationId: get_administration_id_recurring_sales_invoices
    post:
      summary: Creates a new recurring sales invoice
      description: |-
        A recurring sales invoice will create new sales invoices on set intervals. To create a new recurring sales invoice,
        you need to provide at least a contact and details for the invoice. Furthermore you need to determine the planning.
        The following fields will influence the planning:

        1. `invoice_date`: the date in which the first invoice should be created
        2. `frequency_type`: the type of frequency you want to use, for example `month`
        3. `frequency`: defines the actual frequency, e.g. `frequency=2` and `frequency_type=month` will create an invoice every 2 months
        4. `has_desired_count`: whether or not the desired count should take effect
        5. `desired_count`: maximum number of sales invoices to create
      tags:
        - Recurring sales invoices
      parameters:
        - $ref: '#/components/parameters/administration_id'
        - $ref: '#/components/parameters/format'
      requestBody:
        required: true
        content:
          application/*:
            schema:
              unevaluatedProperties: false
              type: object
              properties:
                recurring_sales_invoice:
                  type: object
                  unevaluatedProperties: false
                  properties:
                    document_style_id:
                      $ref: '#/components/schemas/identifier'
                      description: Should be a valid document style id.
                    contact_id:
                      $ref: '#/components/schemas/identifier'
                      description: Should be a valid contact id.
                    contact_person_id:
                      $ref: '#/components/schemas/identifier'
                      description: Should be a valid contact person id.
                    update_contact:
                      type:
                        - boolean
                        - string
                      description: When `true`, the contact's address and other details are refreshed from the current contact record each time a new invoice is generated.
                    reference:
                      type: string
                      description: A reference to include on each generated invoice, e.g. a contract or project code.
                    invoice_date:
                      type: string
                      description: Should be in the future.
                    workflow_id:
                      $ref: '#/components/schemas/identifier'
                      description: Should be a valid workflow id.
                    currency:
                      type: string
                      description: ISO three-character currency code, e.g. EUR or USD.
                    first_due_interval:
                      type: integer
                      description: The number of days after the invoice date before each generated invoice is due.
                    prices_are_incl_tax:
                      type:
                        - boolean
                        - string
                      description: Whether the prices on generated invoices are inclusive of tax.
                    discount:
                      $ref: '#/components/schemas/number'
                      description: Discount percentage, e.g. 10,0%.
                    frequency_type:
                      type: string
                      description: Can be `day`, `week`, `month`, `quarter` or `year`.
                    frequency:
                      type: string
                      description: The interval multiplier. Combined with `frequency_type` to determine the billing cycle, e.g. `frequency=2` with `frequency_type=month` creates an invoice every 2 months.
                    has_desired_count:
                      type:
                        - boolean
                        - string
                      description: When `true`, the recurring invoice will stop generating new invoices after `desired_count` invoices have been created.
                    desired_count:
                      type: string
                      description: The maximum number of invoices to generate. Only applied when `has_desired_count` is `true`.
                    auto_send:
                      type:
                        - boolean
                        - string
                      description: When `true`, each generated invoice is automatically sent to the contact via the configured delivery method.
                    mergeable:
                      type:
                        - boolean
                        - string
                      description: When `true`, generated invoices may be merged with other mergeable invoices for the same contact, if they share the same workflow, layout, currency, language and other invoice settings.
                    details_attributes:
                      $ref: '#/components/schemas/details_attributes'
                    custom_fields_attributes:
                      $ref: '#/components/schemas/custom_fields_attributes'
                  required: []
              required: []
      responses:
        '201':
          description: Recurring sales invoice created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/recurring_sales_invoice_response'
        '400':
          $ref: '#/components/responses/400_bad_request'
        '402':
          $ref: '#/components/responses/402_payment_required'
        '422':
          $ref: '#/components/responses/422_unprocessable_entity'
      operationId: post_administration_id_recurring_sales_invoices
