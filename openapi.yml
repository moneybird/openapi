    patch:
      summary: Updates a recurring sales invoice
      description: |-
        Updates a recurring sales invoice. Only possible if the recurring sales invoice has no active subscription.

        ### Required scope(s)
         `sales_invoices`
      tags:
        - Recurring sales invoices
      security:
        - bearerAuth:
            - sales_invoices
      parameters:
        - $ref: '#/components/parameters/administration_id'
