  /{administration_id}/purchase_transactions{format}:
    get:
      summary: List all purchase transactions
      description: |-
        Returns a list of purchase transactions in the administration.

        ### Required scope(s)
         `bank`
      tags:
        - Purchase transactions
      security:
        - bearerAuth:
            - bank
      parameters:
        - $ref: '#/components/parameters/administration_id'
        - $ref: '#/components/parameters/format'
        - name: filter
          in: query
          required: false
          description: |-
            Filters are `key:value` terms separated by commas (e.g. `period:this_year,state:open`). Any filter you pass replaces the defaults below entirely, so include every key you need — in particular pass an explicit `period` (a named period or a `YYYYMMDD..YYYYMMDD` range) to look beyond the default financial year. Available filters:

            | **Filter** | **Type** | **Default** | **Description** |
            | --- | --- | --- | --- |
            | state | `String` | `all` | `all`, `open`, `pending_payment`, `paid` or `cancelled` |
            | period | `String` | `nil` | This can either be the description of a period (`this_week`, `prev_week`, `next_week`, `this_month`, `prev_month`, `next_month`, `this_quarter`, `prev_quarter`, `next_quarter`, `this_year`, `prev_year`, `next_year`) or a custom period (`201301..201302`, `20130101..20130131`) |
            | unbatched | `Boolean` | `true` | `true` or `false` |

            You can filter by multiple states at the same time as well. To do this, separate the state values by a pipe: `state:open|pending_payment`.
          schema:
            type: string
            default: unbatched:true
          examples:
            ReturnsAllPurchaseTransactionsFilteredOnPeriod:
              summary: Returns all purchase transactions filtered on period
              value: period:this_month
            DoesNotListPaidTransactions:
              summary: Does not list paid transactions
              value: state:pending_payment,unbatched:true,signable_by_user:true
            ReturnsOnlyPurchaseTransactionsReadyToBeSigned:
              summary: Returns only purchase transactions ready to be signed
              value: state:awaiting_authorization,unbatched:true,signable_by_user:true
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/per_page'
      responses:
