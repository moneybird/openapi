  /{administration_id}/recurring_sales_invoices{format}:
    get:
      summary: List all recurring sales invoices
      description: |-
        Returns a paginated list of recurring sales invoices in the administration.

        ### Required scope(s)
         `sales_invoices`
      tags:
        - Recurring sales invoices
      security:
        - bearerAuth:
            - sales_invoices
      parameters:
        - $ref: '#/components/parameters/administration_id'
        - $ref: '#/components/parameters/format'
        - name: filter
          in: query
          required: false
          description: |-
            Filters are `key:value` terms separated by commas (e.g. `state:active,contact_id:123`). Any filter you pass replaces the defaults below entirely, so include every key you need. Available filters:

            | **Filter** | **Type** | **Default** | **Description** |
            | --- | --- | --- | --- |
            | state | `String` | `active` | `active` or `inactive` |
            | frequency | `String` | `all` | `all`, `day`, `week`, `month`, `quarter` or `year` |
            | auto_send | `Boolean` | `null` | `null`, `true` or `false` |
            | contact_id | `Integer` | | Filters recurring invoices by a single contact |
            | workflow_id | `Integer` | | Filters recurring invoices by a single workflow |
          schema:
            type: string
            default: state:active
          examples:
            ReturnsRecurringInvoicesFilteredOnContact:
              summary: Returns recurring invoices filtered on contact
              value: contact_id:492272813485328027
            ReturnsRecurringInvoicesFilteredOnFrequency:
              summary: Returns recurring invoices filtered on frequency
              value: frequency:month
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/per_page'
      responses:
        '200':
          description: A list of recurring sales invoices
