        content:
          application/*:
            schema:
              unevaluatedProperties: false
              type: object
              properties:
                product:
                  type: object
                  unevaluatedProperties: false
                  properties:
                    title:
                      type: string
                      description: The name of the product, displayed on invoices and estimates.
                    description:
                      type: string
                      description: A description of the product. Used as the default detail description when adding this product to a document.
                    checkout_description:
                      type: string
                      description: A description shown on the checkout page when selling this product online via Moneybird checkout.
                    price:
                      $ref: '#/components/schemas/number'
                      description: Both a decimal and a string '10,95' are accepted.
                    document_style_id:
                      $ref: '#/components/schemas/identifier'
                      description: Should be a valid document style id.
                    ledger_account_id:
                      $ref: '#/components/schemas/identifier'
                      description: Should be a valid ledger account id.
                    tax_rate_id:
                      $ref: '#/components/schemas/identifier'
                      description: Should be a valid tax rate id.
                    workflow_id:
                      $ref: '#/components/schemas/identifier'
                      description: Should be a valid workflow id.
                    currency:
                      type: string
                      description: ISO three-character currency code, e.g. EUR or USD.
                    checkout_type:
                      type: string
                      description: Can be `product` or `subscription`.
                    frequency_type:
                      type: string
                      description: Can be `day`, `week`, `month`, `quarter` or `year`.
                    frequency:
                      type: integer
                      description: Should be an integer >= 1.
                    product_type:
                      type: string
                      description: Can be `digital_service`, `service` or `product`.
                    vat_rate_type:
                      type: string
                      description: Can be `standard` or `reduced`.
                    max_amount_per_order:
                      type: integer
                      description: When `checkout_type` is `subscription`, should be an integer 0 <= *n* < 2.
                    identifier:
                      type: string
                      description: Should be unique for the administration.
                    frequency_preset:
                      type: string
                      description: A predefined billing interval label for subscription products, e.g. `monthly`, `quarterly`, `yearly`.
                  required:
                    - price
                    - ledger_account_id
              required: []
            examples:
