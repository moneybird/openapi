    post:
      summary: Create a new subscription
      description: |-
        Starts a new subscription for the given contact. The `product_id` points to a product with a frequency, price and description.
        A recurring sales invoice is automatically created to bill the contact for the given frequency. The first invoice will be sent on the
        start date, but no sooner than tomorrow. The `reference` will be added to the sales invoices.

        Optionally you can create a subscription with a different frequency than stored in the product. Make sure the frequency of the product
        and the provided frequency are compatible. E.g. you can bill a monthly product yearly.

        ### Required scope(s)
         `sales_invoices`
      tags:
        - Subscriptions
      security:
        - bearerAuth:
            - sales_invoices
      parameters:
        - $ref: '#/components/parameters/administration_id'
        - $ref: '#/components/parameters/format'
      requestBody:
        required: true
        content:
          application/*:
            schema:
              unevaluatedProperties: false
              type: object
              properties:
                subscription:
                  type: object
                  unevaluatedProperties: false
                  properties:
                    start_date:
                      type: string
                      format: date
                    product_id:
                      $ref: '#/components/schemas/identifier'
                      description: Should be a valid product id.
                    amount:
                      type: string
                      description: Quantity of the product billed each period.
                    discount:
                      $ref: '#/components/schemas/number'
                      description: Both a decimal and a string '10,95' are accepted.
                    contact_id:
                      $ref: '#/components/schemas/identifier'
                      description: Should be a valid contact id.
                    contact_person_id:
                      $ref: '#/components/schemas/identifier'
                      description: Should be a valid contact person id.
                    end_date:
                      type: string
                      format: date
                    reference:
                      type: string
                    document_style_id:
                      $ref: '#/components/schemas/identifier'
                      description: Should be a valid document style id.
                    frequency:
                      type: integer
                      description: Number of periods between invoices, combined with `frequency_type`. Must be compatible with the product's frequency (e.g. a monthly product can be billed yearly). Defaults to the product's frequency.
                    frequency_type:
                      type: string
                      enum:
                        - day
                        - week
                        - month
                        - quarter
                        - year
                      description: Length of a single billing period, combined with `frequency`. Defaults to the product's frequency type.
                    mergeable:
                      type:
                        - boolean
                        - string
                      default: false
                      description: Merge invoices from this subscription with other mergeable invoices for the same contact before sending. Only applies when invoices are sent automatically.
                    prices_are_incl_tax:
                      type:
                        - boolean
                        - string
                      default: false
                      description: Whether the amounts on the generated invoices are inclusive of tax.
                  required:
                    - start_date
                    - product_id
              required: []
            examples:
              CreatesANewSubscriptionForTheContact:
                summary: Creates a new subscription for the contact
                value:
                  subscription:
                    start_date: '2026-07-11'
                    contact_id: 492272925764749060
                    product_id: 492272925780477700
                    reference: moneybird.nl
                    discount: 10
                    amount: 5x
