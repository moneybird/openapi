      requestBody:
        required: true
        content:
          application/*:
            schema:
              unevaluatedProperties: false
              type: object
              properties:
                recurring_sales_invoice:
                  type: object
                  unevaluatedProperties: false
                  properties:
                    document_style_id:
                      $ref: '#/components/schemas/identifier'
                      description: Should be a valid document style id.
                    contact_id:
                      $ref: '#/components/schemas/identifier'
                      description: Should be a valid contact id.
                    contact_person_id:
                      $ref: '#/components/schemas/identifier_nullable'
                      description: Should be a valid contact person id.
                    update_contact:
                      type:
                        - boolean
                        - string
                      description: When `true`, the contact's address and other details are refreshed from the current contact record each time a new invoice is generated.
                    reference:
                      type: string
                      description: A reference to include on each generated invoice, e.g. a contract or project code.
                    invoice_date:
                      type: string
                      description: Should be in the future.
                    workflow_id:
                      $ref: '#/components/schemas/identifier'
                      description: Should be a valid workflow id.
                    currency:
                      type: string
                      description: ISO three-character currency code, e.g. EUR or USD.
                    first_due_interval:
                      type: integer
                      description: The number of days after the invoice date before each generated invoice is due.
                    prices_are_incl_tax:
                      type:
                        - boolean
                        - string
                      description: Whether the prices on generated invoices are inclusive of tax.
                    discount:
                      $ref: '#/components/schemas/number'
                      description: Discount percentage, e.g. 10,0%.
                    frequency_type:
                      type: string
                      description: Can be `day`, `week`, `month`, `quarter` or `year`.
                    frequency:
                      type: string
                      description: The interval multiplier. Combined with `frequency_type` to determine the billing cycle.
                    has_desired_count:
                      type:
                        - boolean
                        - string
                      description: When `true`, the recurring invoice stops after `desired_count` invoices have been created.
                    desired_count:
                      type: string
                      description: The maximum number of invoices to generate. Only applied when `has_desired_count` is `true`.
                    auto_send:
                      type:
                        - boolean
                        - string
                      description: When `true`, each generated invoice is automatically sent to the contact.
                    mergeable:
                      type:
                        - boolean
                        - string
                      description: When `true`, generated invoices may be merged with other mergeable invoices for the same contact, if they share the same workflow, layout, currency, language and other invoice settings.
                    details_attributes:
                      $ref: '#/components/schemas/details_attributes'
                    custom_fields_attributes:
                      $ref: '#/components/schemas/custom_fields_attributes'
                  required: []
              required: []
