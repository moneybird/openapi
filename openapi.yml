    post:
      summary: Create a webhook
      description: |-
        Creates a new webhook. The provided URL should respond with a 200 HTTP status. After
        creation, the URL will receive notifications when events on documents in the
        administration occur. It is also possible to subscribe to certain events by adding an array
        with events you would like to receive notifications from. For a full list of available events
        and event groups, see the [webhook events documentation](https://developer.moneybird.com/webhooks/events).

        <p class="notice">
          <i class="fa fa-exclamation-triangle"></i>
          We strongly recommend that you use a secure HTTPS endpoint for receiving payload from Moneybird.<br/>
          If you use unencrypted HTTP, anyone on the network may be able to listen in on sensitive information like contacts and invoices.
        </p>

        ### Required scope(s)
         `settings`
      tags:
        - Webhooks
      security:
        - bearerAuth:
            - settings
      parameters:
        - $ref: '#/components/parameters/administration_id'
        - $ref: '#/components/parameters/format'
      requestBody:
        required: true
        content:
          application/*:
            schema:
              unevaluatedProperties: false
              type: object
              properties:
                url:
                  type: string
                  description: The HTTPS endpoint URL that will receive webhook notifications. Must respond with HTTP 200 on creation.
                enabled_events:
                  type: array
                  description: List of events to subscribe to. See [webhook events](https://developer.moneybird.com/webhooks/events) for all available events and event groups.
                  items:
                    type:
                      - string
              required:
                - url
            examples:
              CreatesAWebhookThatIsSubscribedToEnabledEvents:
                summary: Creates a webhook that is subscribed to enabled events
                value:
                  url: http://www.mocky.io/v2/5185415ba171ea3a00704eed
                  enabled_events:
                    - contact_created
              CreatesAWebhook:
                summary: Creates a webhook
                value:
                  url: http://www.mocky.io/v2/5185415ba171ea3a00704eed
      responses:
        '201':
          description: Webhook created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/webhook_response'
              examples:
                CreatesAWebhookThatIsSubscribedToEnabledEvents:
                  summary: Creates a webhook that is subscribed to enabled events
                  value:
                    id: '492273043412878796'
                    administration_id: 123
                    url: http://www.mocky.io/v2/5185415ba171ea3a00704eed
                    enabled_events:
                      - contact_created
                    last_http_status: null
                    last_http_body: null
                    token: z6MvdMS8bqRgQPPRidi4qA1Z
                    secret: 0c02ae0494986503486dbe5af66796b8d7c307d5212aa39acd7ae369149fa1fe
                    deactivated_at: null
                CreatesAWebhook:
                  summary: Creates a webhook
                  value:
                    id: '492273043536610776'
                    administration_id: 123
                    url: http://www.mocky.io/v2/5185415ba171ea3a00704eed
                    enabled_events: []
                    last_http_status: null
                    last_http_body: null
                    token: nr2yWb5w31qhssD4MBRxBpbN
                    secret: 6f9743dcfc2e46b743079f6495b9b307a8d3c3ae2757a97bc23ae78d82b5ae9c
                    deactivated_at: null
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/symbolic_error'
              examples:
                ReturnsAnErrorWhenEventsIsProvided:
                  summary: Returns an error when events is provided
                  value:
                    error: '''events'' has been removed from webhooks, use ''enabled_events'''
                    symbolic:
