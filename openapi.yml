                summary: Updates a contact with given si identifier
                value:
                  contact:
                    si_identifier: '1234567'
                    si_identifier_type: NL:KVK
              UpdateAContactThatHasSepaActivated:
                summary: Update a contact that has sepa activated
                value:
                  contact:
                    company_name: Test B.V.
