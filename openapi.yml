    delete:
      summary: Deletes a ledger account
      description: |-
        Deletes or deactivates a ledger account.
        First, an attempt is made to deactivate the ledger account.
        If that fails, an attempt is made to delete the ledger account.
        Always returns a 204 status code even if the ledger account could not be deleted or deactivated.

        ### Required scope(s)
         `settings`
      tags:
        - Ledger accounts
      security:
        - bearerAuth:
            - settings
      parameters:
        - $ref: '#/components/parameters/administration_id'
        - name: id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/identifier'
        - $ref: '#/components/parameters/format'
      responses:
        '204':
          description: Ledger account deleted
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/symbolic_error'
              examples:
                Returns404WhenTheLedgerAccountDoesNotExist:
                  summary: Returns 404 when the ledger account does not exist
                  value:
                    error: record not found
                    symbolic:
                      id: not_found
      operationId: delete_administration_id_ledger_accounts_id
