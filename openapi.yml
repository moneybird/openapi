  /{administration_id}/time_entries{format}:
    get:
      summary: List all time entries
      description: |-
        Returns a paginated list of time entries in the administration.

        ### Required scope(s)
         `time_entries`
      tags:
        - Time entries
      security:
        - bearerAuth:
            - time_entries
      parameters:
        - $ref: '#/components/parameters/administration_id'
        - $ref: '#/components/parameters/format'
        - name: filter
          in: query
          required: false
          description: |-
            Filters are `key:value` terms separated by commas (e.g. `period:this_year,state:all`). Any filter you pass replaces the defaults below entirely, so include every key you need — in particular pass an explicit `period` (a named period or a `YYYYMMDD..YYYYMMDD` range) to look beyond the default financial year. Available filters:

            | **Filter** | **Type** | **Default** | **Description** |
            | --- | --- | --- | --- |
            | state | `String` | `all` | `all`, `open` or `non_billable` |
            | period | `String` | `this_year` | This can either be the description of a period (`this_week`, `prev_week`, `next_week`, `this_month`, `prev_month`, `next_month`, `this_quarter`, `prev_quarter`, `next_quarter`, `this_year`, `prev_year`, `next_year`) or a custom period (`201301..201302`, `20130101..20130131`) |
            | contact_id | `Integer` | | Select time entries belonging to a certain contact |
            | include_nil_contacts | `Boolean` | false | Whether to include time entries that have no assigned contact |
            | include_active | `Boolean` | false | Whether to include active time entries i.e. time entries without ended_at |
            | project_id | `Integer` | | Select time entries belonging to a certain project |
            | user_id | `Integer` | | Select time entries belonging to a certain user |
            | day | `Date` | | Select time entries on a specific date |

            You can filter by multiple states at the same time as well. To do this, separate the state values by a pipe: `state:open|non_billable`.
          schema:
            type: string
            default: period:this_year
          examples:
            ReturnsAllTimeEntriesFilteredOnState:
              summary: Returns all time entries filtered on state
              value: state:non_billable
            ReturnsAllTimeEntriesFilteredOnPeriod:
              summary: Returns all time entries filtered on period
              value: period:this_month
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/per_page'
        - name: query
          in: query
          required: false
          schema:
            type: string
            description: Allows filtering by time entry description.
          examples:
            ReturnsAllTimeEntriesFilteredOnSearchQuery:
              summary: Returns all time entries filtered on search query
              value: Custom
      responses:
        '200':
          description: A list of time entries
