        - $ref: '#/components/parameters/format'
      requestBody:
        required: true
        content:
          application/*:
            schema:
              unevaluatedProperties: false
              type: object
              properties:
                booking_type:
                  type: string
                  description: The type of record to link the mutation to.
                  enum:
                    - SalesInvoice
                    - Document
                    - LedgerAccount
                    - PaymentTransactionBatch
                    - PurchaseTransaction
                    - NewPurchaseInvoice
                    - NewReceipt
                    - PaymentTransaction
                    - PurchaseTransactionBatch
                    - ExternalSalesInvoice
                    - Payment
                    - VatDocument
                booking_id:
                  $ref: '#/components/schemas/identifier'
                  description: The id of the record to link, of the type set in `booking_type` (e.g. the ledger account id when `booking_type` is `LedgerAccount`).
                price_base:
                  $ref: '#/components/schemas/number'
                  description: |-
                    The booking amount, in the administration's base currency. For most
                    booking types — including `LedgerAccount`, `NewPurchaseInvoice`,
                    `NewReceipt` and payment transactions — this is the field that carries
                    the amount. When linking a payment to an invoice it is the
                    base-currency counterpart of `price`. For `booking_type`
                    `LedgerAccount` send the amount here; `price` is ignored. Both a
                    decimal and a string '10,95' are accepted.
                price:
                  $ref: '#/components/schemas/number'
                  description: |-
                    Amount in the booking's own currency, used when linking a payment to
                    an invoice. For a foreign-currency invoice both `price` and
                    `price_base` are required. Not used for `booking_type`
                    `LedgerAccount` — use `price_base` there instead. Both a decimal and
                    a string '10,95' are accepted.
                description:
                  type: string
                payment_batch_identifier:
                  type: string
                project_id:
                  $ref: '#/components/schemas/identifier'
                  description: Should be a valid project id.
                mark_open_sepa_transaction_as_paid:
                  type:
                    - boolean
                    - string
              required:
                - booking_type
            examples:
              CreatesANewReceipt:
                summary: Creates a new receipt
                value:
                  booking_type: NewReceipt
                  price_base: -100
              LinksAPurchaseInvoiceToTheFinancialMutation:
                summary: Links a purchase invoice to the financial mutation
                value:
                  booking_type: Document
                  booking_id: 492272961180402700
                  price_base: -100
              CreatesABookingForAForeignInvoiceWithAnExchangeRateDifference:
                summary: Creates a booking for a foreign invoice with an exchange rate difference
                value:
                  booking_type: LedgerAccount
                  booking_id: 492272961596687400
                  price_base: 1.48
              CreatesALedgerAccountBookingForAPositiveAmount:
                summary: Creates a ledger account booking for a positive amount
                value:
                  booking_type: LedgerAccount
                  booking_id: 492272961710982300
                  price_base: 100
              CreatesANewPurchaseInvoice:
                summary: Creates a new purchase invoice
                value:
                  booking_type: NewPurchaseInvoice
                  price_base: -100
              CreatesALedgerAccountBookingForANegativeAmount:
                summary: Creates a ledger account booking for a negative amount
                value:
                  booking_type: LedgerAccount
                  booking_id: 492272962084275300
                  price_base: 100
              LinksASalesInvoiceToTheFinancialMutation:
                summary: Links a sales invoice to the financial mutation
                value:
                  booking_type: SalesInvoice
                  booking_id: 492272962450228400
                  price_base: '363.0'
      responses:
        '200':
          description: Status code
          content:
            application/json:
              schema:
                type: integer
              examples:
                CreatesANewReceipt:
                  summary: Creates a new receipt
                  value: 200
                LinksAPurchaseInvoiceToTheFinancialMutation:
                  summary: Links a purchase invoice to the financial mutation
                  value: 200
                CreatesABookingForAForeignInvoiceWithAnExchangeRateDifference:
                  summary: Creates a booking for a foreign invoice with an exchange rate difference
                  value: 200
                CreatesALedgerAccountBookingForAPositiveAmount:
                  summary: Creates a ledger account booking for a positive amount
                  value: 200
                CreatesANewPurchaseInvoice:
                  summary: Creates a new purchase invoice
                  value: 200
                CreatesALedgerAccountBookingForANegativeAmount:
                  summary: Creates a ledger account booking for a negative amount
                  value: 200
                LinksASalesInvoiceToTheFinancialMutation:
                  summary: Links a sales invoice to the financial mutation
                  value: 200
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/symbolic_error'
              examples:
                ReturnsA400InsteadOfCrashingWhenPriceBaseIsOmittedForANegativeMutation:
                  summary: Returns a 400 instead of crashing when price base is omitted for a negative mutation
                  value:
                    error: Price can't be nil
                    symbolic:
                      price: nils
        '404':
          $ref: '#/components/responses/404_not_found'
      operationId: patch_administration_id_financial_mutations_id_link_booking
