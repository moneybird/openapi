  /{administration_id}/financial_mutations/synchronization{format}:
    get:
      summary: List all ids and versions
      description: |-
        Returns all financial mutations in the administration. The list contains the id and the version of the financial mutation.
        Check if the version of the financial mutation is newer than the version you have stored locally, use the `POST`
        variant for fetching financial mutations with the given ids.

        ### Required scope(s)
         `bank`
      tags:
        - Financial mutations
      security:
        - bearerAuth:
            - bank
      parameters:
        - $ref: '#/components/parameters/administration_id'
        - $ref: '#/components/parameters/format'
        - name: filter
          in: query
          required: false
          description: |-
            Filters are `key:value` terms separated by commas (e.g. `period:this_year,state:all`). Any filter you pass replaces the defaults below entirely, so include every key you need — in particular pass an explicit `period` (a named period or a `YYYYMMDD..YYYYMMDD` range) to look beyond the default financial year. Available filters:

            | **Filter** | **Type** | **Default** | **Description** |
            | - | - | - | - |
            | period | `String` | `this_year` | This can either be the description of a period (`this_week`, `prev_week`, `next_week`, `this_month`, `prev_month`, `next_month`, `this_quarter`, `prev_quarter`, `next_quarter`, `this_year`, `prev_year`, `next_year`) or a custom period (`201301..201302`, `20130101..20130131`) |
            | state | `String` | | Can be `all`, `unprocessed` or `processed`|
            | mutation_type | `String` | | Can be `all`, `debit` or `credit` |
            | financial_account_id | `String` | |
          schema:
            type: string
            default: period:this_year
          examples:
            RetrievesTheIdSForSynchronizationWithAFilter:
              summary: Retrieves the id's for synchronization with a filter
              value: period:this_month
      responses:
        '200':
          description: IDs and versions of records
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  unevaluatedProperties: false
                  properties:
                    id:
                      type:
                        - integer
                        - string
                    version:
                      type:
                        - integer
                        - string
              examples:
                RetrievesTheIdSForSynchronization:
                  summary: Retrieves the id's for synchronization
                  value:
                    - id: '492272958529603205'
                      version: 1783688098
                    - id: '492272958586226318'
                      version: 1783688098
                    - id: '492272958609294999'
                      version: 1783688099
                RetrievesTheIdSForSynchronizationWithAFilter:
                  summary: Retrieves the id's for synchronization with a filter
                  value:
                    - id: '492272958680598179'
                      version: 1783688099
                    - id: '492272958703666860'
                      version: 1783688099
                    - id: '492272958725686965'
                      version: 1783688099
                RetrievesOnlyUniqueIds:
                  summary: Retrieves only unique ids
                  value:
                    - id: '492272958793844417'
                      version: 1783688099
                    - id: '492272958813767370'
                      version: 1783688099
                    - id: '492272958834738899'
