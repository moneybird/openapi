    post:
      summary: Creates a new ledger account
      description: |-
        The `account_type` determines the kind of ledger account, this can be any of the following values:
        `non_current_assets`, `current_assets`, `equity`, `provisions`, `non_current_liabilities`, `current_liabilities`, `revenue`, `direct_costs`, `expenses`, `other_income_expenses`

        By providing the `parent_id`, it is possible to create a tree of ledger accounts. Make sure the `account_types`
        of the parent and child equal.

        ### Required scope(s)
         `settings`
      tags:
        - Ledger accounts
      security:
        - bearerAuth:
            - settings
      parameters:
        - $ref: '#/components/parameters/administration_id'
        - $ref: '#/components/parameters/format'
      requestBody:
        required: true
        content:
          application/*:
            schema:
              unevaluatedProperties: false
              type: object
              properties:
                ledger_account:
                  type: object
                  unevaluatedProperties: false
                  properties:
                    name:
                      type: string
                      description: Should be unique for this combination of administration and account type.
                    account_type:
                      type: string
                      enum:
                        - non_current_assets
                        - current_assets
                        - equity
                        - provisions
                        - non_current_liabilities
                        - current_liabilities
                        - revenue
                        - direct_costs
                        - expenses
                        - other_income_expenses
                    account_id:
                      $ref: '#/components/schemas/identifier'
                      description: Optional field, also known as general ledger code. Should be unique.
                    parent_id:
                      $ref: '#/components/schemas/identifier'
                      description: Id of the parent ledger account. Should be a valid ledger account id.
                    allowed_document_types:
                      type: string
                      enum:
                        - sales_invoice
                        - purchase_invoice
                        - general_journal_document
                        - financial_mutation
                        - payment
                      description: Restricts the document types this ledger account can be used on. Defaults to a set derived from the `account_type`.
                    description:
                      type: string
                  required:
                    - name
                    - account_type
                rgs_code:
                  type: string
                  description: Existing RGS version 3.5 code, e.g. 'WMfoBelMfo'
              required:
                - rgs_code
            examples:
              CreatesANewLedgerAccountWithTaxonomyItemByProvidingAnExistingRgsCode:
                summary: Creates a new ledger account with taxonomy item by providing an existing rgs code
                value:
                  rgs_code: WOmzAovEie
                  ledger_account:
                    name: Test ledger account
                    account_type: expenses
                    account_id: 2182
              CreatesANewLedgerAccount:
                summary: Creates a new ledger account
                value:
                  ledger_account:
                    name: Test ledger account
                    account_type: expenses
                    account_id: 2182
                  rgs_code: WAfsAmv
      responses:
        '201':
          description: Ledger account created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ledger_account_response'
              examples:
                CreatesANewLedgerAccountWithTaxonomyItemByProvidingAnExistingRgsCode:
                  summary: Creates a new ledger account with taxonomy item by providing an existing rgs code
                  value:
                    id: '492273011644171613'
                    administration_id: 123
                    name: Test ledger account
                    account_type: expenses
                    account_id: '2182'
                    parent_id: null
                    active: true
                    created_at: '2026-07-10T12:55:49.585Z'
                    updated_at: '2026-07-10T12:55:49.585Z'
                    allowed_document_types:
                      - purchase_invoice
                      - financial_mutation
                      - general_journal_document
                    taxonomy_item:
                      taxonomy_version: '3.5'
                      code: WOmzAovEie
                      name: Eiergeld
                      name_english: Egg money
                      reference: '8008040'
                    financial_account_id: null
                CreatesANewLedgerAccount:
                  summary: Creates a new ledger account
                  value:
                    id: '492273011684017503'
                    administration_id: 123
                    name: Test ledger account
                    account_type: expenses
                    account_id: '2182'
                    parent_id: null
                    active: true
                    created_at: '2026-07-10T12:55:49.623Z'
                    updated_at: '2026-07-10T12:55:49.623Z'
                    allowed_document_types:
                      - purchase_invoice
                      - financial_mutation
                      - general_journal_document
                    taxonomy_item:
                      taxonomy_version: '3.5'
                      code: WAfsAmv
                      name: Afschrijvingen op materiële vaste activa
                      name_english: Depreciation of tangible fixed assets
                      reference: '4102000'
                    financial_account_id: null
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/symbolic_error'
              examples:
                ReturnsAnErrorWhenNameIsNotProvided:
                  summary: Returns an error when name is not provided
                  value:
                    error: Name is required
                    symbolic:
                      ledger_account:
                        name: required
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/symbolic_error'
              examples:
                ReturnsErrorWhenProvidedRgsCodeDoesNotBelongToATaxonomyItemOfVersion35:
                  summary: Returns error when provided rgs code does not belong to a taxonomy item of version 3.5
                  value:
                    error: Given RGS code does not belong to a taxonomy item of version 3.5
                    symbolic:
                      rgs_code: not_found
        '422':
          description: Unprocessable entity
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/symbolic_error'
                  - $ref: '#/components/schemas/non_symbolic_error'
              examples:
                ReturnsAnErrorWhenAnEmptyNameIsProvided:
                  summary: Returns an error when an empty name is provided
                  value:
                    error:
                      name:
                        - can't be blank
                    details:
                      name:
                        - error: blank
      operationId: post_administration_id_ledger_accounts
