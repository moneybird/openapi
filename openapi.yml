        Check if the version of the document is newer than the version you have stored locally, use the `POST`
        variant for fetching documents with the given ids.

        ### Required scope(s)
         `documents`
      tags:
        - 'Documents: Purchase invoices'
      security:
        - bearerAuth:
            - documents
