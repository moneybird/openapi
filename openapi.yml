          application/*:
            schema:
              unevaluatedProperties: false
              type: object
              properties:
                sales_invoice:
                  type: object
                  unevaluatedProperties: false
                  properties:
                    contact_id:
                      $ref: '#/components/schemas/identifier'
                      description: The ID of the contact associated with the sales invoice. This is mandatory when setting the contact_person_id. Should be a valid contact id.
                    contact_person_id:
                      $ref: '#/components/schemas/identifier'
                      description: The ID of the contact person associated with the sales invoice. Should be a valid contact person id.
                    update_contact:
                      type:
                        - boolean
                        - string
                      description: When `true`, the contact's address and other details are updated on the invoice from the current contact record.
                    original_estimate_id:
                      $ref: '#/components/schemas/identifier'
                      description: The ID of the estimate this invoice was created from. Used to link an invoice to its originating estimate.
                    document_style_id:
                      $ref: '#/components/schemas/identifier'
                      description: Default document style is used if value is not provided. Should be a valid document style id.
                    workflow_id:
                      $ref: '#/components/schemas/identifier'
                      description: If value is not provided, the workflow saved in the contact is used. If the contact doesn't have a default workflow, the administration's default workflow is used. Should be a valid workflow id.
                    reference:
                      type: string
                      description: Your own reference for this invoice, e.g. a project code or PO number. Visible to the recipient.
                    invoice_sequence_id:
                      type: string
                      description: The ID of the numbering sequence to use for the invoice number.
                    remove_invoice_sequence_id:
                      type:
                        - boolean
                        - string
                      description: Set to `true` to remove the assigned numbering sequence, reverting to the administration default.
                    invoice_date:
                      type: string
                      description: The date of the invoice.
                      format: date
                    first_due_interval:
                      type: integer
                      description: The number of days after the invoice date before the invoice is due.
                    currency:
                      type: string
                      description: ISO three-character currency code, e.g. EUR or USD.
                    prices_are_incl_tax:
                      type:
                        - boolean
                        - string
                      description: Whether the prices on the invoice are inclusive of tax.
                    payment_conditions:
