  /{administration_id}/sales_invoices/{id}/send_invoice{format}:
    patch:
      summary: Sends an invoice
      description: |-
        This endpoint provides two options: sending the invoice and scheduling sending in the future. When sending
        now, you can provide a send method, email address and message. If you don't provide any arguments, the defaults
        from the contact and workflow will be used. If you have sent the invoice before, then the settings from
        the previous sending are used instead of the defaults.

        When scheduling sending, set the boolean `sending_scheduled` to true and provide an `invoice_date`.

        ### Required scope(s)
         `sales_invoices`
      tags:
        - Sales invoices
      security:
        - bearerAuth:
            - sales_invoices
      parameters:
        - $ref: '#/components/parameters/administration_id'
        - name: id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/identifier'
        - $ref: '#/components/parameters/format'
      requestBody:
        required: true
        content:
          application/*:
            schema:
              unevaluatedProperties: false
              type: object
              properties:
                sales_invoice_sending:
                  type: object
                  unevaluatedProperties: false
                  properties:
                    delivery_method:
                      type: string
                      enum:
                        - Email
                        - Peppol
                        - Manual
                    sending_scheduled:
                      type:
                        - boolean
                        - string
                      default: false
                      description: Schedule the invoice to be sent in the future instead of immediately. Combine with `invoice_date` to set the date on which it is sent.
                    deliver_ubl:
                      type:
                        - boolean
                        - string
                      description: Attach a UBL (e-invoicing) file to the email. Only used when `delivery_method` is `Email`; defaults to the contact's UBL preference.
                    mergeable:
                      type:
                        - boolean
                        - string
                      default: false
                      description: When multiple scheduled invoices share the same contact, identity, workflow, document style, currency, language and invoice date, merge them into a single invoice before sending.
                    email_address:
                      type: string
                      description: Recipient email address. Only used when `delivery_method` is `Email`; overrides the contact's default email address.
                    email_message:
                      type: string
                      description: Message included in the email. Only used when `delivery_method` is `Email`; defaults to the workflow's invoice email text.
                    invoice_date:
                      type: string
                      format: date
                      description: When scheduling, the date on which the invoice is sent.
                  required: []
              required: []
            examples:
              SendsAnInvoice:
                summary: Sends an invoice
                value: {}
              SendsAnInvoiceWithAlternativeInformation:
                summary: Sends an invoice with alternative information
                value:
                  sales_invoice_sending:
                    delivery_method: Email
                    email_address: alternative@example.com
                    email_message: Hi, this is my invoice with id {invoice_id}!
              SendsAnInvoiceViaMailWithAnUblAttachment:
                summary: Sends an invoice via mail with an ubl attachment
                value:
                  sales_invoice_sending:
                    delivery_method: Email
                    deliver_ubl: true
                    email_address: alternative@example.com
              ScheduleSending:
                summary: Schedule sending
                value:
                  sales_invoice_sending:
                    sending_scheduled: true
                    invoice_date: '2026-07-11'
              FallsBackToE-mailDeliveryWhenSendingSimplerinvoicingForTheSecondTime:
                summary: Falls back to e-mail delivery when sending simplerinvoicing for the second time
                value: {}
      responses:
        '200':
