    patch:
      summary: Update a subscription
      description: |-
        Updates the product the contact is subscribed to. This will automatically calculate the differences
        between the product prices and create a one off sales invoice to bill the extra charge for the remaining
        billing period.

        Optionally you can provide a start date for the product change to become active.

        ### Required scope(s)
         `sales_invoices`
      tags:
        - Subscriptions
      security:
        - bearerAuth:
            - sales_invoices
      parameters:
        - $ref: '#/components/parameters/administration_id'
