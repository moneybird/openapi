      description: |-
        When updating a time entry, provide only the attributes you want to update. The other attributes will not be changed.
        `started_at` and `ended_at` are rounded down to full minutes when updating a time entry, with a minimum of 1 minute between them.

        ### Required scope(s)
         `time_entries`
      tags:
        - Time entries
      security:
        - bearerAuth:
            - time_entries
      parameters:
        - $ref: '#/components/parameters/administration_id'
        - name: id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/identifier'
        - $ref: '#/components/parameters/format'
      requestBody:
        required: true
        content:
          application/*:
            schema:
              unevaluatedProperties: false
              type: object
              properties:
                time_entry:
                  type: object
                  unevaluatedProperties: false
                  properties:
                    started_at:
                      type: string
                      format: date-time
                      description: The start time of the time entry. Rounded down to full minutes.
                    ended_at:
                      type: string
                      format: date-time
                      description: The end time of the time entry. Rounded down to full minutes. A time entry without `ended_at` is considered a running (active) time entry.
                    paused_duration:
                      type: integer
                      description: Total paused duration in seconds, is rounded down to full minutes.
                    contact_id:
                      $ref: '#/components/schemas/identifier'
                      description: Should be a valid contact id.
                    project_id:
                      $ref: '#/components/schemas/identifier'
                      description: Should be a valid project id.
                    sales_invoice_id:
                      $ref: '#/components/schemas/identifier'
                      description: Should be a valid sales invoice id.
                    description:
                      type: string
                      description: A description of how the time was spent. May be shown on the invoice.
                    billable:
                      type:
                        - boolean
                        - string
                      description: Whether this time entry is billable to the client.
                      default: true
                  required: []
              required: []
            examples:
              UpdatingTheTimeEntryDescription:
                summary: Updating the time entry description
                value:
                  time_entry:
                    description: Updated description
      responses:
        '200':
          description: Time entry updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/time_entry_response'
              examples:
                UpdatingTheTimeEntryDescription:
                  summary: Updating the time entry description
